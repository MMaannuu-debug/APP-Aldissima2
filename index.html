<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcetto Manager - Aldissima</title>
    <meta name="description" content="Gestione partite di calcetto - Convocazioni, squadre, statistiche e classifiche">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Calcetto Manager">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- SheetJS for Excel Exports -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- Loading screen -->
        <div id="loading" class="loading-screen">
            <canvas id="pong-loading-canvas"></canvas>
            <div id="goal-message" class="goal-message hidden">GOAL!</div>
            <p class="loading-text-overlay">In riscaldamento...</p>
            <script>
                // Executing immediately inside the div to start animation ASAP
                (function() {
                    const canvas = document.getElementById('pong-loading-canvas');
                    const ctx = canvas.getContext('2d');
                    const goalMsg = document.getElementById('goal-message');
                    
                    let cw, ch;
                    let ball = { x: 0, y: 0, r: 14, vx: 4, vy: 6, angle: 0 };
                    let goalScored = false;

                    function resize() {
                        cw = Math.min(window.innerWidth * 0.9, 450);
                        ch = Math.min(window.innerHeight * 0.75, 650);
                        canvas.width = cw;
                        canvas.height = ch;
                        
                        if(!goalScored) {
                            ball.x = cw / 2;
                            ball.y = ch / 2;
                        }
                    }

                    window.addEventListener('resize', resize);
                    resize();

                    function drawField() {
                        ctx.clearRect(0, 0, cw, ch);
                        
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                        ctx.lineWidth = 3;

                        // Field boundaries
                        ctx.strokeRect(0, 0, cw, ch);
                        
                        // Center line
                        ctx.beginPath();
                        ctx.moveTo(0, ch / 2);
                        ctx.lineTo(cw, ch / 2);
                        ctx.stroke();

                        // Center circle
                        ctx.beginPath();
                        ctx.arc(cw / 2, ch / 2, cw * 0.15, 0, Math.PI * 2);
                        ctx.stroke();
                        
                        // Center dot
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                        ctx.beginPath();
                        ctx.arc(cw / 2, ch / 2, 4, 0, Math.PI * 2);
                        ctx.fill();

                        // Penalty areas
                        const penW = cw * 0.55;
                        const penH = ch * 0.16;
                        ctx.strokeRect((cw - penW) / 2, 0, penW, penH);
                        ctx.strokeRect((cw - penW) / 2, ch - penH, penW, penH);

                        // Goal posts markings
                        const goalW = cw * 0.35;
                        ctx.lineWidth = 6;
                        ctx.strokeStyle = '#fff';
                        
                        // Top goal
                        ctx.beginPath();
                        ctx.moveTo((cw - goalW) / 2, 0);
                        ctx.lineTo((cw + goalW) / 2, 0);
                        ctx.stroke();

                        // Bottom goal
                        ctx.beginPath();
                        ctx.moveTo((cw - goalW) / 2, ch);
                        ctx.lineTo((cw + goalW) / 2, ch);
                        ctx.stroke();
                    }

                    function drawPolygon(x, y, radius, sides) {
                        ctx.beginPath();
                        for (let i = 0; i < sides; i++) {
                            let a = i * 2 * Math.PI / sides - Math.PI/2;
                            if (i === 0) ctx.moveTo(x + radius * Math.cos(a), y + radius * Math.sin(a));
                            else ctx.lineTo(x + radius * Math.cos(a), y + radius * Math.sin(a));
                        }
                        ctx.fill();
                        ctx.closePath();
                    }

                    function drawBall() {
                        ctx.save();
                        ctx.translate(ball.x, ball.y);
                        // Rotate the ball for a rolling effect
                        ctx.rotate(ball.angle);

                        // White base
                        ctx.beginPath();
                        ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
                        ctx.fillStyle = '#fff';
                        ctx.fill();
                        
                        // Black pentagons
                        ctx.fillStyle = '#222';
                        // Center patch
                        drawPolygon(0, 0, ball.r * 0.4, 5);
                        // Surrounding patches
                        for(let i=0; i<5; i++) {
                            let a = (i * Math.PI * 2) / 5;
                            drawPolygon(Math.cos(a) * ball.r * 0.85, Math.sin(a) * ball.r * 0.85, ball.r * 0.35, 5);
                        }

                        // Outline
                        ctx.beginPath();
                        ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
                        ctx.lineWidth = 1.5;
                        ctx.strokeStyle = '#222';
                        ctx.stroke();

                        ctx.restore();
                    }

                    function update() {
                        if (goalScored) return;

                        ball.x += ball.vx;
                        ball.y += ball.vy;
                        // Calculate rotation speed from movement
                        let speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
                        ball.angle += speed * 0.05;

                        // Left and Right walls
                        if (ball.x - ball.r < 0) {
                            ball.x = ball.r;
                            ball.vx *= -1;
                        } else if (ball.x + ball.r > cw) {
                            ball.x = cw - ball.r;
                            ball.vx *= -1;
                        }

                        const goalW = cw * 0.35;
                        
                        // Top wall
                        if (ball.y - ball.r < 0) {
                            if (ball.x > (cw - goalW)/2 && ball.x < (cw + goalW)/2) {
                                scoreGoal();
                            } else {
                                ball.y = ball.r;
                                ball.vy *= -1;
                            }
                        }
                        
                        // Bottom wall
                        if (ball.y + ball.r > ch) {
                            if (ball.x > (cw - goalW)/2 && ball.x < (cw + goalW)/2) {
                                scoreGoal();
                            } else {
                                ball.y = ch - ball.r;
                                ball.vy *= -1;
                            }
                        }
                    }

                    function scoreGoal() {
                        goalScored = true;
                        goalMsg.classList.remove('hidden');
                        
                        setTimeout(() => {
                            goalMsg.classList.add('hidden');
                            ball.x = cw / 2;
                            ball.y = ch / 2;
                            // Reset dynamics
                            ball.vx = (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * 3);
                            ball.vy = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 3);
                            goalScored = false;
                        }, 1200);
                    }

                    function loop() {
                        const loadingDiv = document.getElementById('loading');
                        if (loadingDiv && loadingDiv.classList.contains('hidden')) {
                            return; // App loaded, stop animation and free memory
                        }
                        update();
                        drawField();
                        drawBall();
                        requestAnimationFrame(loop);
                    }

                    loop();
                })();
            </script>
        </div>

        <!-- Auth screen -->
        <div id="auth-screen" class="screen hidden">
            <div class="auth-container">
                <div class="auth-header">
                    <div class="logo">⚽</div>
                    <h1>Calcetto Manager</h1>
                    <p class="subtitle">Aldissima</p>
                </div>

                <div id="login-form" class="auth-form">
                    <h2>Accedi</h2>
                    <div class="form-group">
                        <label for="login-username">Nome utente</label>
                        <input type="text" id="login-username" placeholder="nome.cognome (es. mario.rossi)"
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password (4 cifre)</label>
                        <input type="password" id="login-password" placeholder="0000" maxlength="4" pattern="[0-9]{4}"
                            inputmode="numeric">
                    </div>
                    <button type="button" id="login-btn" class="btn btn-primary">Accedi</button>
                    <p class="auth-switch">Non hai un account? <a href="#" id="show-register">Registrati</a></p>
                </div>

                <div id="register-form" class="auth-form hidden">
                    <h2>Registrati</h2>
                    <div class="form-group">
                        <label for="reg-nome">Nome</label>
                        <input type="text" id="reg-nome" placeholder="Mario" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-cognome">Cognome</label>
                        <input type="text" id="reg-cognome" placeholder="Rossi" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-soprannome">Soprannome (opzionale)</label>
                        <input type="text" id="reg-soprannome" placeholder="Il Mago">
                    </div>
                    <div class="form-group">
                        <label for="reg-telefono">Telefono</label>
                        <input type="tel" id="reg-telefono" placeholder="333 1234567" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-data-nascita">Data di nascita (GIORNO MESE ANNO)</label>
                        <input type="date" id="reg-data-nascita" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password (4 cifre)</label>
                        <input type="password" id="reg-password" placeholder="0000" maxlength="4" pattern="[0-9]{4}"
                            inputmode="numeric" required>
                    </div>
                    <button type="button" id="register-btn" class="btn btn-primary">Registrati</button>
                    <p class="auth-switch">Hai già un account? <a href="#" id="show-login">Accedi</a></p>
                </div>
            </div>
        </div>

        <!-- Main app -->
        <div id="main-app" class="hidden">
            <!-- Header -->
            <header class="app-header">
                <h1 id="page-title" class="mobile-only">Dashboard</h1>

                <!-- Desktop Navigation -->
                <nav class="desktop-nav desktop-only">
                    <button class="nav-item-desktop active" data-page="dashboard">Home</button>
                    <button class="nav-item-desktop" data-page="partite">Partite</button>
                    <button class="nav-item-desktop" data-page="giocatori">Giocatori</button>
                    <button class="nav-item-desktop" data-page="statistiche">Stats</button>
                    <button class="nav-item-desktop admin-only hidden" data-page="admin">Admin</button>
                </nav>

                <div class="header-actions">
                    <span id="user-role" class="role-badge">Operatore</span>
                    <button id="logout-btn" class="btn btn-secondary btn-sm" title="Esci">🚪 Esci</button>
                </div>
            </header>

            <!-- Main content -->
            <main id="main-content">
                <!-- Content will be dynamically loaded here -->
            </main>

            <!-- Bottom navigation -->
            <nav class="bottom-nav">
                <button class="nav-item active" data-page="dashboard">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">Home</span>
                </button>
                <button class="nav-item" data-page="partite">
                    <span class="nav-icon">📅</span>
                    <span class="nav-label">Partite</span>
                </button>
                <button class="nav-item" data-page="giocatori">
                    <span class="nav-icon">👥</span>
                    <span class="nav-label">Giocatori</span>
                </button>
                <button class="nav-item" data-page="statistiche">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Stats</span>
                </button>
                <button class="nav-item admin-only hidden" data-page="admin">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Admin</span>
                </button>
            </nav>
        </div>

        <!-- Modal container -->
        <div id="modal-backdrop" class="modal-backdrop hidden">
            <div id="modal-container" class="modal-container">
                <!-- Modal content will be inserted here -->
            </div>
        </div>

        <!-- Toast notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- App modules -->
    <script type="module" src="app.js"></script>
</body>

</html>
